<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Sun rays -->
  <g stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round">
    <line x1="20" y1="6"  x2="20" y2="2"/>
    <line x1="20" y1="38" x2="20" y2="34"/>
    <line x1="4"  y1="20" x2="0"  y2="20"/>
    <line x1="36" y1="20" x2="40" y2="20"/>
    <line x1="9"  y1="9"  x2="6"  y2="6"/>
    <line x1="31" y1="9"  x2="34" y2="6"/>
    <line x1="9"  y1="31" x2="6"  y2="34"/>
    <line x1="31" y1="31" x2="34" y2="34"/>
  </g>
  <!-- Sun circle -->
  <circle cx="20" cy="20" r="9" fill="#FBBF24"/>
  <!-- Cloud bumps -->
  <circle cx="36" cy="46" r="8"  fill="#E5E7EB"/>
  <circle cx="46" cy="42" r="10" fill="#E5E7EB"/>
  <circle cx="56" cy="46" r="7"  fill="#E5E7EB"/>
  <!-- Cloud flat base -->
  <rect x="28" y="46" width="35" height="12" fill="#E5E7EB"/>
</svg>
