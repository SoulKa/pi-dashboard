server {
    listen 80 default_server;
    root /var/www/pi-dashboard;
    index index.html;

    # Proxy VVS API requests to bypass CORS (mirrors the Vite dev proxy)
    location /api/vvs/ {
        proxy_pass https://www3.vvs.de/mngvvs/;
        proxy_set_header Host www3.vvs.de;
        proxy_ssl_server_name on;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
